<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>

  <!-- Shield body -->
  <path d="M32 12 L50 20 L50 36 Q50 50 32 56 Q14 50 14 36 L14 20 Z"
        fill="#1e293b" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>

  <!-- Shield inner highlight -->
  <path d="M32 16 L46 23 L46 36 Q46 47 32 52 Q18 47 18 36 L18 23 Z"
        fill="none" stroke="#f59e0b" stroke-width="0.75" opacity="0.5"/>

  <!-- Sword blade (vertical, centered) -->
  <rect x="30.5" y="14" width="3" height="28" rx="1"
        fill="#e2e8f0"/>

  <!-- Sword crossguard -->
  <rect x="22" y="38" width="20" height="3" rx="1.5"
        fill="#fbbf24"/>

  <!-- Sword grip -->
  <rect x="30.5" y="41" width="3" height="8" rx="1"
        fill="#92400e"/>

  <!-- Sword pommel -->
  <circle cx="32" cy="50.5" r="2.5" fill="#fbbf24"/>

  <!-- Blade shine -->
  <rect x="31.5" y="15" width="1" height="20" rx="0.5"
        fill="white" opacity="0.45"/>
</svg>
